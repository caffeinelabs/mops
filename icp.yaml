# yaml-language-server: $schema=https://raw.githubusercontent.com/dfinity/icp-cli/main/docs/schemas/icp-yaml-schema.json
#
# Mirrors dfx.json. dfx.json is still kept around for the production deploy
# path (release.yml, deploy-staging, deploy-ic) and for mops users who haven't
# migrated yet.

canisters:
  - name: main
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: backend/main/main-canister.mo
        compress: true
        shrink: true
  - name: bench
    recipe:
      type: "@dfinity/motoko@v4.1.0"
      configuration:
        main: cli/commands/bench/bench-canister.mo
  - name: assets
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        version: "0.29.1"
        dir: frontend/dist
        build:
          - npm run build-frontend
  - name: docs
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        version: "0.29.1"
        dir: docs/build
        build:
          - npm run build-docs
  - name: blog
    recipe:
      type: "@dfinity/asset-canister@v2.1.0"
      configuration:
        version: "0.29.1"
        dir: blog/build
        build:
          - npm run build-blog
  # Raw build/sync (not the recipe) because the asset-canister recipe template
  # only supports a single `dir`, but dfx.json ships two sources for `cli`:
  # `cli-releases/` (install.sh, releases.json, tags/, versions/ — served at
  # cli.mops.one) and `cli-releases/frontend/dist/` (the SPA).
  - name: cli
    build:
      steps:
        - type: script
          commands:
            - npm run build-cli-releases
        - type: pre-built
          url: https://github.com/dfinity/sdk/releases/download/0.29.1/assetstorage.wasm.gz
    sync:
      steps:
        - type: assets
          dirs:
            - cli-releases
            - cli-releases/frontend/dist
  # Static-only canister: no build step, just serves
  # play-frontend/.well-known/ic-domains.
  - name: play-frontend
    build:
      steps:
        - type: pre-built
          url: https://github.com/dfinity/sdk/releases/download/0.29.1/assetstorage.wasm.gz
    sync:
      steps:
        - type: assets
          dir: play-frontend

# Override the default local network port (8000) to bind on dfx's 4943 so
# vite's /api proxy keeps working without changes to the proxy config.
networks:
  - name: local
    mode: managed
    gateway:
      bind: 127.0.0.1
      port: 4943
